name: Generate contribution snake

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: LenChoi
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%2300D9C0

      - name: Show only the current calendar year
        shell: bash
        run: |
          year="$(date -u +%Y)"
          year_start="$(date -u -d "${year}-01-01" +%s)"
          today="$(date -u +%s)"
          start_weekday="$(date -u -d "${year}-01-01" +%w)"
          days_since_start="$(( (today - year_start) / 86400 ))"
          columns="$(( (days_since_start + start_weekday) / 7 + 1 ))"
          crop_x="$(( 16 * (53 - columns) - 16 ))"
          crop_width="$(( 16 * columns + 32 ))"

          for file in dist/*.svg; do
            sed -i -E \
              "s/viewBox=\"-16 -32 880 192\" width=\"880\"/viewBox=\"${crop_x} -32 ${crop_width} 192\" width=\"${crop_width}\"/" \
              "${file}"
          done

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          build_dir: dist
          target_branch: output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="50" y1="20" x2="1150" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset=".5" stop-color="#111827"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="270" y1="115" x2="930" y2="295" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9B8AFB"/>
      <stop offset=".5" stop-color="#6E56CF"/>
      <stop offset="1" stop-color="#00D9C0"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop stop-color="#6E56CF" stop-opacity=".34"/>
      <stop offset="1" stop-color="#6E56CF" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="32"/></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="8"/></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#A9B1D6" stroke-opacity=".055"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="24" fill="url(#grid)"/>
  <ellipse cx="260" cy="110" rx="250" ry="190" fill="url(#glow)" filter="url(#blur)">
    <animate attributeName="cx" values="260;340;260" dur="9s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="1000" cy="350" rx="220" ry="150" fill="#00D9C0" fill-opacity=".09" filter="url(#blur)">
    <animate attributeName="cy" values="350;280;350" dur="11s" repeatCount="indefinite"/>
  </ellipse>

  <g opacity=".72">
    <circle cx="104" cy="82" r="3" fill="#00D9C0"><animate attributeName="opacity" values=".25;1;.25" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="1095" cy="95" r="4" fill="#9B8AFB"><animate attributeName="opacity" values="1;.2;1" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="1040" cy="332" r="3" fill="#00D9C0"><animate attributeName="opacity" values=".2;1;.2" dur="2.2s" repeatCount="indefinite"/></circle>
    <path d="M75 340C165 300 170 355 255 320" stroke="#9B8AFB" stroke-opacity=".35" stroke-width="1.5" stroke-dasharray="5 9">
      <animate attributeName="stroke-dashoffset" values="0;-28" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M950 112C1022 74 1060 134 1130 88" stroke="#00D9C0" stroke-opacity=".35" stroke-width="1.5" stroke-dasharray="5 9">
      <animate attributeName="stroke-dashoffset" values="0;28" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>

  <rect x="325" y="81" width="550" height="36" rx="18" fill="#161B22" stroke="#30363D"/>
  <circle cx="350" cy="99" r="5" fill="#FF5F56"/>
  <circle cx="368" cy="99" r="5" fill="#FFBD2E"/>
  <circle cx="386" cy="99" r="5" fill="#27C93F"/>
  <text x="600" y="104" text-anchor="middle" fill="#7D8590" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">~/engineering/profile</text>

  <text x="600" y="188" text-anchor="middle" fill="#F0F6FC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="64" font-weight="750" letter-spacing="-2">CHOI MINHO</text>
  <rect x="365" y="210" width="470" height="3" rx="1.5" fill="url(#accent)">
    <animate attributeName="width" values="0;470;470" dur="2.2s" repeatCount="1"/>
  </rect>
  <text x="600" y="262" text-anchor="middle" fill="#A9B1D6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" letter-spacing="2">BACKEND DEVELOPER</text>
  <text x="600" y="305" text-anchor="middle" fill="#7D8590" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Kotlin  ·  Java  ·  Spring Boot  ·  production systems</text>

  <g transform="translate(433 338)">
    <rect width="334" height="40" rx="20" fill="#161B22" stroke="#30363D"/>
    <circle cx="26" cy="20" r="6" fill="#00D9C0">
      <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="48" y="26" fill="#C9D1D9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">building reliable systems</text>
  </g>

  <rect x=".75" y=".75" width="1198.5" height="418.5" rx="23.25" stroke="url(#accent)" stroke-opacity=".45" stroke-width="1.5"/>
</svg>
